- name: Autonomous Walking Robot (2019)
  descr: "This project follows the course of MEU3300-01, Creative Design Project 2, Yonsei University, 2019. Design the robot based on the Jansen mechanism and made a direction decision algorithm that could autonomously walk on a specific map."
  github: https://github.com/kbdlab/walking_robot

- name: Self-driving Robot (2018)
  descr: "This project was supported by Hyundai AutoEver on 2018.
          Use LEGO MINDSTORMS EV3 for making robot and made a direction decision algorithm that could autonomously drive on a specific map."
  website: http://hyundaiautoeversmart.com/
